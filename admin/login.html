<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KaamWala Admin Login</title>
  </head>
  <body class="min-h-screen bg-shell font-sans">
    <main class="grid min-h-screen place-items-center px-4">
      <section class="card w-full max-w-md p-6">
        <div class="gradient-brand mb-5 flex h-12 w-12 items-center justify-center rounded-xl">
          <i data-lucide="shield" class="h-6 w-6 text-white"></i>
        </div>
        <h1 class="font-display text-3xl font-extrabold">Admin login</h1>
        <p class="mt-2 text-sm text-neutral-500">Direct admin URL. Email/password login ke baad access Supabase role/admins table se check hota hai.</p>
        <form id="adminLoginForm" class="mt-6 grid gap-3">
          <input class="input-field" name="email" type="email" placeholder="Admin email address" required />
          <input class="input-field" name="password" type="password" placeholder="Password" minlength="8" required />
          <button class="btn-primary w-full" type="submit">Login to dashboard</button>
          <button id="adminResetBtn" class="text-sm font-bold text-brand hover:text-brand-dark" type="button">Forgot password?</button>
        </form>
      </section>
    </main>
    <div id="toast" class="hidden"></div>
    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
