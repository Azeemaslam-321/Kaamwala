<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KaamWala Admin Login</title>
  </head>
  <body class="min-h-screen bg-shell font-sans">
    <main class="grid min-h-screen place-items-center px-4">
      <section class="card w-full max-w-md p-6">
        <div class="gradient-brand mb-5 flex h-12 w-12 items-center justify-center rounded-xl">
          <i data-lucide="shield" class="h-6 w-6 text-white"></i>
        </div>
        <h1 class="font-display text-3xl font-extrabold">Admin login</h1>
        <p class="mt-2 text-sm text-neutral-500">Direct admin URL. Access is checked from Supabase role/admins table.</p>
        <form id="adminLoginForm" class="mt-6 grid gap-3">
          <input class="input-field" name="phone" placeholder="Admin phone number" required />
          <button class="btn-primary w-full" type="submit">Send OTP</button>
        </form>
        <form id="adminOtpForm" class="mt-4 hidden grid gap-3">
          <div class="grid gap-3">
            <input class="input-field" name="otp" placeholder="Enter OTP" required />
            <button class="btn-dark w-full" type="submit">Verify admin access</button>
          </div>
        </form>
      </section>
    </main>
    <div id="toast" class="hidden"></div>
    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
